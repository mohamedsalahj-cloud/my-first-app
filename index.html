<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيقي التفاعلي الأول</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin-top: 50px; background-color: #eef2f3; color: #333; }
        .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: inline-block; max-width: 400px; width: 90%; }
        input { padding: 10px; width: 80%; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; margin-bottom: 15px; text-align: center; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background-color: #28a745; color: white; border: none; border-radius: 5px; font-weight: bold; }
        button:hover { background-color: #218838; }
        h2 { color: #007bff; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>تطبيقي التفاعلي الأول 🚀</h1>
        <p>اكتب اسمك في الأسفل واضغط على الزر:</p>
        
        <input type="text" id="userName" placeholder="اكتب اسمك هنا...">
        <br>
        <button onclick="greetUser()">اضغط للترحيب</button>

        <h2 id="greetingMessage"></h2>
    </div>

    <script>
        function greetUser() {
            var name = document.getElementById("userName").value;
            if (name === "") {
                document.getElementById("greetingMessage").innerText = "الرجاء كتابة اسمك أولاً! 😊";
            } else {
                document.getElementById("greetingMessage").innerText = "أهلاً بك يا " + name + " في عالم البرمجة! 🎉";
            }
        }
    </script>

</body>
</html>
